<div class="page">
  <div class="content-wrapper">
    <!-- Breadcrumbs / Phase Indicator -->
    <app-phase-breadcrumb [phases]="phases" />

    <!-- Heading Section -->
    <div class="heading-section">
      <h1 class="text-headline-lg heading">Identify a Contradiction</h1>
      <p class="text-body-md subcopy">Describe the inventive problem you are facing in technical detail.</p>
    </div>

    <!-- Problem Input Card -->
    <app-rd-card>
      <div class="card-body">
        <!-- Definition Textarea -->
        <app-labeled-textarea
          label="INPUT_DEFINITION"
          placeholder="I need X to improve, but Y degrades when I push it..."
          [rows]="8"
          [value]="definition()"
          [errorMessage]="errorMessage()"
          (valueChange)="onDefinitionChange($event)"
        />

        <!-- Secondary Context Grid -->
        <div class="context-grid">
          <app-labeled-input
            label="SYSTEM_REQUIREMENT"
            placeholder="e.g. Minimal Weight"
            [value]="systemRequirement()"
            (valueChange)="onSystemRequirementChange($event)"
          />
          <app-labeled-input
            label="PHYSICAL_LIMIT"
            placeholder="e.g. Structural Integrity"
            [value]="physicalLimit()"
            (valueChange)="onPhysicalLimitChange($event)"
          />
        </div>

        <!-- Action Row -->
        <div class="action-row">
          <div class="hint">
            <span class="material-symbols-outlined hint-icon" aria-hidden="true">info</span>
            <span class="text-label-mono hint-text">Format: [System Component] must [Desired Action] while [Constraint] is maintained.</span>
          </div>
          <app-button
            variant="primary"
            [disabled]="!isValid()"
            (buttonClick)="onSubmit()"
          >
            <span class="text-label-caps">SOLVE PROBLEM</span>
            <span trailing-icon class="material-symbols-outlined arrow" aria-hidden="true">arrow_forward</span>
          </app-button>
        </div>
      </div>
    </app-rd-card>

    <!-- Skeletal Technical Context (Decorative) -->
    <div class="skeletal-grid" aria-hidden="true">
      <div class="skeletal-box skeletal-x"></div>
      <div class="skeletal-box skeletal-x"></div>
      <div class="skeletal-box skeletal-lines">
        <div class="skeleton-line line"></div>
        <div class="skeleton-line line short"></div>
        <div class="skeleton-line line shorter"></div>
      </div>
    </div>
  </div>
</div>
