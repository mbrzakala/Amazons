services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-amazons}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-amazons}
      POSTGRES_DB: ${POSTGRES_DB:-amazons}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-amazons}']
      interval: 5s
      timeout: 5s
      retries: 10

  embeddings:
    build:
      context: ./apps/backend/embeddings
    restart: unless-stopped
    ports:
      - '11434:8080'

  mcp-server:
    build:
      context: ./apps/backend/mcp-server
    restart: unless-stopped
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
      EMBEDDING_MODEL: embeddinggemma:300m
      EMBEDDING_SERVICE_URL: http://embeddings:8080/v1
      EMBEDDING_API_KEY: ollama
    depends_on:
      - embeddings
    ports:
      - '8000:8000'

  adk-agents:
    build:
      context: ./apps/backend/adk-agents
    restart: unless-stopped
    environment:
      MCP_SERVER_URL: http://mcp-server:8000/mcp
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      PORT: 8081
    depends_on:
      - mcp-server
    ports:
      - '8081:8081'

  backend-api:
    build:
      context: .
      dockerfile: apps/backend/backend-api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-amazons}:${POSTGRES_PASSWORD:-amazons}@postgres:5432/${POSTGRES_DB:-amazons}
      ADK_AGENT_URL: http://adk-agents:8081
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      adk-agents:
        condition: service_started
    ports:
      - '3000:3000'

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8080
    depends_on:
      - backend-api
    ports:
      - '8080:8080'

volumes:
  postgres-data:
