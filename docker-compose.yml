services:
  cloud-sql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.12.0
    command:
      - "--address=0.0.0.0"
      - "--port=5432"
      - "gen-lang-client-0338633763:europe-west1:amazons-db"
    restart: unless-stopped
    volumes:
      - ~/.config/gcloud:/root/.config/gcloud:ro
    ports:
      - "5432:5432"

  embeddings:
    build:
      context: ./apps/backend/embeddings
    restart: unless-stopped
    ports:
      - '11434:8080'

  mcp-server:
    build:
      context: ./apps/backend/mcp-server
    restart: unless-stopped
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
      EMBEDDING_MODEL: embeddinggemma:300m
      EMBEDDING_SERVICE_URL: http://embeddings:8080/v1
      EMBEDDING_API_KEY: ollama
    depends_on:
      - embeddings
    ports:
      - '8000:8000'

  adk-agents:
    build:
      context: ./apps/backend/adk-agents
    restart: unless-stopped
    environment:
      MCP_SERVER_URL: http://mcp-server:8000/mcp
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      PORT: 8081
    depends_on:
      - mcp-server
    ports:
      - '8081:8081'

  backend-api:
    build:
      context: .
      dockerfile: apps/backend/backend-api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:inventapassword@cloud-sql-proxy:5432/amazons
      ADK_AGENT_URL: http://adk-agents:8081
      NODE_ENV: production
      PORT: 3000
    depends_on:
      cloud-sql-proxy:
        condition: service_started
      adk-agents:
        condition: service_started
    ports:
      - '3000:3000'

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8080
      BACKEND_URL: http://backend-api:3000
    depends_on:
      - backend-api
    ports:
      - '8080:8080'

volumes: {}
