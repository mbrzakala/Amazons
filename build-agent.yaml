steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REGISTRY_NAME}/amazons-adk-agent:latest',
      'apps/backend/adk-agents'
    ]
    env: ['DOCKER_BUILDKIT=1']
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REGISTRY_NAME}/amazons-adk-agent:latest'

substitutions:
  _REGION: europe-west1
  _REGISTRY_NAME: amazons-repo
